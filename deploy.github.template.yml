# Copy to .github/workflows/deploy.yml and push with a token that has
# the `workflow` scope (or use SSH). GitHub OAuth Apps used by `gh` CLI
# often cannot push workflow files on first repo creation.

name: Deploy BlueOS Extension Image

on:
  push:

jobs:
  deploy-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Clear Docker cache
        run: |
          docker builder prune -f
          docker buildx prune -f

      - name: Deploy BlueOS Extension
        uses: BlueOS-community/Deploy-BlueOS-Extension@v1.2.0
        with:
          docker-username: ${{ secrets.DOCKER_USERNAME }}
          docker-password: ${{ secrets.DOCKER_PASSWORD }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-name: "br_explorehd_dvr"
          build-platforms: "linux/arm64/v8,linux/arm/v7"
          author: ${{ vars.MY_NAME }}
          author-email: ${{ vars.MY_EMAIL }}
          maintainer: ${{ vars.ORG_NAME }}
          maintainer-email: ${{ vars.ORG_EMAIL }}
